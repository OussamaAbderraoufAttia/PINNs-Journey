name: "burgers_1d_experiment"
seed: 42
device: "auto"

model:
  input_dim: 2
  output_dim: 1
  hidden_layers: [128, 128, 128, 128]
  activation: "sin"
  initialization: "xavier_normal"
  dropout: 0.0

training:
  epochs: 15000
  learning_rate: 1e-3
  optimizer: "adam"
  scheduler: "cosine"
  gradient_clip: 1.0
  early_stopping_patience: 2000
  early_stopping_min_delta: 1e-6

sampling:
  n_collocation: 20000
  n_boundary: 2000
  n_initial: 2000
  strategy: "lhs"
  adaptive: true
  adaptive_freq: 2000
  adaptive_top_k: 1000

equation:
  equation_type: "burgers_1d"
  parameters:
    nu: 0.0031830988618379067

loss_weights:
  physics: 1.0
  boundary: 100.0
  initial: 100.0

logging:
  log_dir: "logs"
  log_freq: 100
  plot_freq: 500
  save_freq: 1000
  use_wandb: false